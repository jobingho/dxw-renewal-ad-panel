:root{--bg:#f6f8fb;--panel:#fff;--text:#1f2937;--muted:#6b7280;--line:#d9e0ea;--red:#c62828;--green:#2e7d32;--blue:#155eef;--amber:#b45309}

[data-theme=glass]{--bg:#eaf6fb;--panel:#ffffffcc;--text:#183247;--muted:#4b6475;--line:#b8d7e4;--red:#b91c1c;--green:#047857;--blue:#0369a1;--amber:#a16207}
[data-theme=purple]{--bg:#f7f2fb;--panel:#fff;--text:#30213d;--muted:#6b5b75;--line:#dac9e8;--red:#be123c;--green:#047857;--blue:#6d28d9;--amber:#b45309}
[data-theme=finance]{--bg:#fff7f4;--panel:#fff;--text:#33201b;--muted:#7c5d55;--line:#edd2c8;--red:#b91c1c;--green:#047857;--blue:#1d4ed8;--amber:#b45309}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 "Microsoft YaHei",Arial,sans-serif}
html,body{max-width:100%;overflow-x:hidden}
header{padding:18px 22px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5}
h1{margin:0 0 12px;font-size:22px}.toolbar{display:grid;grid-template-columns:repeat(11,minmax(110px,1fr));gap:10px;align-items:end}
label{display:grid;gap:4px;color:var(--muted);font-size:12px}select,input,button{height:34px;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:6px;padding:0 10px}
button{cursor:pointer;font-weight:600}.primary{background:var(--blue);border-color:var(--blue);color:#fff}.status{margin-top:10px;color:var(--muted);font-size:12px}

.card span{display:block;color:var(--muted);font-size:12px}.card strong{font-size:20px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}
table{width:100%;border-collapse:collapse;min-width:1120px;background:var(--panel)}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}th{position:sticky;top:0;background:var(--panel);z-index:1}
td.num,th.num{text-align:right}tr.active{outline:2px solid var(--blue);outline-offset:-2px}.tag{display:inline-block;border-radius:999px;padding:2px 7px;margin:2px;background:#eef2ff;color:#3730a3;font-size:12px}
.bad{color:var(--green)}.good{color:var(--red)}.warn{color:var(--amber)}img.thumb{width:76px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--line)}
canvas{width:100%;height:280px;border:1px solid var(--line);border-radius:8px;background:var(--panel)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.drawer{position:fixed;right:-460px;top:0;width:440px;max-width:96vw;height:100vh;background:var(--panel);border-left:1px solid var(--line);padding:16px;z-index:10;transition:.2s;overflow:auto}.drawer.open{right:0}.empty{color:var(--muted);padding:14px;border:1px dashed var(--line);border-radius:8px}

/* Mint finance dashboard visual system inspired by the provided reference board. */
:root{
  --mint-bg:#edf7f2;
  --mint-bg-2:#f8fbf8;
  --mint-panel:rgba(255,255,255,.88);
  --mint-ink:#18302d;
  --mint-muted:#6e8480;
  --mint-line:#d8e8e3;
  --mint-accent:#2f8f73;
  --mint-accent-2:#9adf7f;
  --mint-coral:#ff9f8f;
  --mint-yellow:#d9f15f;
  --mint-shadow:0 18px 45px rgba(45,96,83,.12);
}
body{
  background:
    radial-gradient(circle at 18% 8%, rgba(154,223,127,.28), transparent 28%),
    radial-gradient(circle at 88% 16%, rgba(255,159,143,.18), transparent 24%),
    linear-gradient(135deg,var(--mint-bg),#f7fbf8 42%,#eef8f4);
  color:var(--mint-ink);
  padding-left:86px;
}
.side-rail{
  position:fixed;
  left:18px;
  top:18px;
  bottom:18px;
  width:54px;
  z-index:20;
  border-radius:28px;
  background:#17332f;
  box-shadow:0 18px 36px rgba(23,51,47,.24);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:14px 0;
}
.rail-logo{
  width:34px;height:34px;border-radius:16px;
  background:linear-gradient(135deg,var(--mint-accent-2),#fff6a8);
  color:#17332f;font-weight:900;display:grid;place-items:center;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);
}
.rail-dot{
  width:32px;height:32px;border-radius:14px;
  color:#bdd6ce;display:grid;place-items:center;
  font-size:13px;font-weight:800;
}
.rail-dot.active{background:#244a43;color:#fff}
header{
  margin:18px 26px 0 0;
  padding:22px 24px;
  border:1px solid rgba(216,232,227,.9);
  border-radius:26px;
  background:linear-gradient(120deg,rgba(255,255,255,.94),rgba(244,251,247,.88));
  box-shadow:var(--mint-shadow);
  backdrop-filter:blur(12px);
}
h1{
  font-size:28px;
  line-height:1.1;
  letter-spacing:0;
  color:#102b27;
}
.toolbar{
  grid-template-columns:repeat(6,minmax(150px,1fr));
  gap:12px;
}
label{
  color:var(--mint-muted);
  font-weight:700;
  font-size:12px;
}
select,input{
  height:38px;
  border:1px solid var(--mint-line);
  background:rgba(255,255,255,.82);
  color:var(--mint-ink);
  border-radius:12px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
  font-weight:700;
}
button{
  height:38px;
  border-radius:13px;
  border:1px solid var(--mint-line);
  background:#fff;
  color:#17332f;
  box-shadow:0 6px 14px rgba(55,93,81,.08);
}
button:hover{transform:translateY(-1px);box-shadow:0 9px 20px rgba(55,93,81,.13)}
.primary,button.primary,#updateLatest{
  background:linear-gradient(135deg,#2f8f73,#62c78e);
  border-color:#2f8f73;
  color:#fff;
}
#makePpt,#savePpt{background:#17332f;color:#fff;border-color:#17332f}
.status{
  margin-top:14px;
  color:#5a706b;
  background:rgba(237,247,242,.8);
  border:1px solid var(--mint-line);
  border-radius:14px;
  padding:10px 12px;
}
main{
  padding:20px 26px 34px 0;
  gap:18px;
}
.section{
  border:1px solid rgba(216,232,227,.95);
  border-radius:24px;
  padding:18px;
  background:var(--mint-panel);
  box-shadow:var(--mint-shadow);
  backdrop-filter:blur(10px);
}
h2{
  color:#102b27;
  font-size:19px;
  font-weight:900;
}
.cards{
  grid-template-columns:repeat(8,minmax(120px,1fr));
  gap:12px;
}
.card{
  border:1px solid var(--mint-line);
  border-radius:18px;
  padding:14px;
  background:linear-gradient(150deg,#fff,rgba(244,251,247,.88));
  box-shadow:0 10px 22px rgba(52,96,83,.08);
}
.card:nth-child(2n){background:linear-gradient(150deg,#fff,#f5ffe7)}
.card:nth-child(3n){background:linear-gradient(150deg,#fff,#eefaf5)}
.card span{color:#6c817d;font-weight:800}
.card strong{font-size:23px;color:#102b27}
.table-wrap{
  border:1px solid var(--mint-line);
  border-radius:18px;
  background:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
}
table{
  background:#fff;
}
th{
  background:#f5fbf8;
  color:#24443e;
  font-weight:900;
}
td,th{border-bottom:1px solid #e2eee9}
tr.active{
  outline:2px solid #69c894;
  background:#f1fbf5;
}
.tag{
  background:#eef8f2;
  color:#1f725c;
  border:1px solid #cfe8dd;
  font-weight:800;
}
img.thumb{
  width:84px;height:54px;
  border-radius:12px;
  border:1px solid var(--mint-line);
  box-shadow:0 6px 16px rgba(40,75,67,.12);
}
canvas{
  border:1px solid var(--mint-line);
  border-radius:20px;
  background:linear-gradient(180deg,#fff,#fbfefc);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
}
.drawer{
  border-left:1px solid var(--mint-line);
  background:rgba(255,255,255,.96);
  box-shadow:-18px 0 40px rgba(39,80,70,.18);
}
.empty{
  border-color:var(--mint-line);
  background:#f8fcfa;
  color:#526e67;
  border-radius:16px;
}
@media(max-width:1100px){
  body{padding-left:0}
  .side-rail{display:none}
  header{margin:12px}
  main{padding:12px}
  .toolbar{grid-template-columns:repeat(2,minmax(0,1fr))}
  .cards{grid-template-columns:repeat(2,minmax(0,1fr))}
}

<body>
<aside class="side-rail" aria-label="Dashboard navigation">
  <div class="side-brand"><span class="brand-mark"></span><span>运营后台</span></div>
  <div class="nav-group-title">功能菜单</div>
  <div class="nav-item active">数据分析报表</div>
  <div class="nav-subgroup">
    <div class="nav-subitem active">数据总表</div>
    <div class="nav-subitem">日报表</div>
    <div class="nav-subitem">周报表</div>
    <div class="nav-subitem">月报表</div>
  </div>

</aside>
<header>
  <h1>短线王续费 广告数据面板</h1>
  <div class="toolbar">
    <label>项目<select id="project"></select></label>

function renderDiagnosis(rows){const s=sum(rows), best=[...rows].sort((a,b)=>b.clickRate-a.clickRate)[0], weak=[...rows].filter(r=>r.popup>=50).sort((a,b)=>a.clickRate-b.clickRate)[0]; $('dailyTitle').textContent=`单日运营诊断 ${state.selectedDate}`; if(!rows.length){$('diagnosis').innerHTML='<div class=empty>无数据：当前筛选没有匹配到当天明细，旧明细已清空。</div>';return} const low=[...rows].filter(r=>tags(r).some(t=>t!=='素材可复用')).slice(0,8); $('diagnosis').innerHTML=`<div class=grid2><div><h2>01 核心指标</h2><div class=cards>${[['广告数',rows.length],['弹出人数',s.popup],['点击人数',s.click],['购买点击人数',s.purchaseClick],['提交订单',s.order],['成交人数',s.deal],['点击率',pct(s.clickRate)],['购买点击率',pct(s.purchaseClickRate)],['订单提交率',pct(s.orderSubmitRate)],['付款完成率',pct(s.paymentFinishRate)],['最高ID',Math.max(...rows.map(r=>+r.adId))],['最低ID',Math.min(...rows.map(r=>+r.adId))],['有效广告',rows.filter(r=>r.popup>=50).length],['预警线','点击率<2%'],['素材分类',ADSTAT_DATA.sideData.ocr.status],['OCR覆盖','0%'],['行情贴合',ADSTAT_DATA.sideData.marketSummary.status],['最佳素材',best?best.adId:'-'],['弱项素材',weak?weak.adId:'-']].map(x=>`<div class=card><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('')}</div></div><div><h2>02 行情简述</h2>${marketHtml()}<h2>03 漏斗与素材池</h2><div class=empty>弹出 ${fmt(s.popup)} -> 点击 ${fmt(s.click)} -> 购买点击 ${fmt(s.purchaseClick)} -> 提交订单 ${fmt(s.order)} -> 成交 ${fmt(s.deal)}。同人群替换仅基于 audienceKey 完全一致；样本不足已提示风险。</div></div></div><h2>04 诊断与低效广告</h2><div class=table-wrap><table><tr><th>低效广告ID</th><th class=num>点击率</th><th>原图</th><th>建议替换图</th><th>参考ID</th><th>样本量提示</th><th>低效原因与替换分析</th><th>创新</th></tr>${low.map(r=>{const same=rows.filter(x=>x.audienceKey===r.audienceKey&&x.adId!==r.adId&&x.clickRate>r.clickRate).sort((a,b)=>b.clickRate-a.clickRate)[0];return `<tr><td>${r.adId}</td><td class=num>${pct(r.clickRate)}</td><td><img class=thumb src="${r.image}" onerror="this.alt='图片加载失败'"></td><td>${same?`<img class=thumb src="${same.image}">`:'无同人群更优素材'}</td><td>${same?same.adId:'-'}</td><td>${r.popup<50?'样本不足':'样本充足'}</td><td>${tags(r).join('、')}；${same?'同 audienceKey 可参考替换。':'未找到同人群可直接替换素材。'}</td><td><button onclick="openCreative('${r.adId}')">创新</button></td></tr>`}).join('')}</table></div><h2>05 明细数据</h2>`}
function repairOcrText(v){return String(v??'').replace(/\s+/g,' ').replace(/([\u4e00-\u9fff])\s+(?=[\u4e00-\u9fff])/g,'$1').replace(/([\u4e00-\u9fff])\s+(?=[0-9A-Za-z])/g,'$1').replace(/([0-9A-Za-z])\s+(?=[\u4e00-\u9fff])/g,'$1').replace(/\s+([，。！？；：、）》])/g,'$1').replace(/([《（])\s+/g,'$1').replace(/\s*\/\s*/g,'/').replaceAll('短王','短线王').trim()}
function safeText(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function materialHtml(m,r){const type=safeText(m.type||'待OCR识别'),status=safeText(m.ocrStatus||'待OCR识别'),coreClean=repairOcrText(m.coreText||'待OCR识别'),rawClean=repairOcrText(m.rawOcr||m.note||'无'),core=safeText(coreClean),market=safeText(m.marketFit||'待结合行情复核'),raw=safeText(rawClean),done=String(m.ocrStatus||'').includes('已识别')&&String(m.rawOcr||m.coreText||'').trim()&&!String(m.coreText||'').includes('待OCR');const action=done?'':`<button class="ocr-action" data-ocr="${r.adId}" onclick="runOcr('${r.adId}')">OCR识别</button>`;const detail=done?`<div>OCR状态：${status}，需人工校对</div><div>行情判断：${market}</div><div class="ocr-text">识别文案：${raw}</div><div class="ocr-raw-note">提示：OCR为机器识别，错字不作为投放结论。</div>`:`<div>OCR状态：${status}</div><div>行情判断：${market}</div><div class="ocr-text">说明：${raw}</div>`;return `<div class="material-cell"><div class="material-brief"><span class="material-pill">${done?'已OCR识别':type}</span><div class="material-line" title="${core}">核心：${core}</div>${action}</div><details><summary>${done?'查看识别文案':'展开详情'}</summary><div class="material-more">${detail}</div></details></div>`}
function renderDetails(rows){const shown=rows.slice(0,state.detailLimit);$('detailTable').className='detail-table';$('detailTable').innerHTML='<tr><th>日期</th><th>渠道</th><th>广告ID</th><th>标题</th><th>图片</th><th>弹出时间</th><th>命中人群</th><th class=num>弹出人数</th><th class=num>点击人数</th><th class=num>点击率</th><th class=num>购买点击人数</th><th class=num>提交订单</th><th class=num>成交人数</th><th class=num>购买点击率</th><th class=num>订单提交率</th><th class=num>付款完成率</th><th>素材分析</th><th>问题标签</th><th>创新</th><th>更新时间</th></tr>'+shown.map(r=>{const m=r.materialAnalysis||{};return `<tr><td>${r.date}</td><td>${r.channel}</td><td>${r.adId}</td><td>${r.title}</td><td><a href="${r.image}" target="_blank"><img class=thumb loading="lazy" decoding="async" src="${r.image}" onerror="this.alt='图片加载失败'"></a></td><td>${String(r.popupTime).replaceAll('\n','<br>')}</td><td>${String(r.target).replaceAll('\n','<br>')}</td><td class=num>${fmt(r.popup)}</td><td class=num>${fmt(r.click)}</td><td class=num>${pct(r.clickRate)}</td><td class=num>${fmt(r.purchaseClick)}</td><td class=num>${fmt(r.order)}</td><td class=num>${fmt(r.deal)}</td><td class=num>${pct(r.purchaseClickRate)}</td><td class=num>${pct(r.orderSubmitRate)}</td><td class=num>${pct(r.paymentFinishRate)}</td><td>${materialHtml(m,r)}</td><td>${tags(r).map(t=>`<span class=tag>${t}</span>`).join('')}</td><td><button class="creative-action" onclick="openCreative('${r.adId}')">创新广告图</button></td><td>${r.updatedAt}</td></tr>`}).join('');$('detailPager').innerHTML=rows.length>state.detailLimit?`<span>已显示 ${state.detailLimit} / ${rows.length} 条</span><button id="loadMoreDetails">加载更多</button>`:`<span>共 ${rows.length} 条明细</span>`;const more=$('loadMoreDetails');if(more)more.onclick=()=>{state.detailLimit+=50;renderDetails(rows)}}
function openCreative(id){const r=ADSTAT_DATA.rows.find(x=>x.adId==id);$('drawerBody').innerHTML=`<h2>AI 创新广告图</h2><img src="${r.image}" style="width:100%;border-radius:8px"><p>广告ID：${r.adId}</p><p>标题：${r.title}</p><p>目标人群：${String(r.target).replaceAll('\n',' / ')}</p><p>当前点击率：${pct(r.clickRate)}，订单：${r.order}，成交：${r.deal}</p><p>问题标签：${tags(r).join('、')}</p><button onclick="copyCreative('${r.adId}')">复制生成需求</button><button onclick="alert('未配置图片生成服务，只能复制生成需求。')">本地服务生成</button><button onclick="alert('候选图功能未接入，不能直接作为投放结论。')">标记为待测试素材</button><button onclick="confirm('重新生成可能消耗额度；当前未配置服务。')">重新生成</button>`;$('drawer').classList.add('open')}
function copyCreative(id){const r=ADSTAT_DATA.rows.find(x=>x.adId==id);const text=`产品：${ADSTAT_DATA.project.name}\n广告ID：${r.adId}\n目标人群：${r.target}\n当前问题：${tags(r).join('、')}\n生成方向：强化续费权益、降低夸大承诺、突出行动按钮，尺寸参考原图。候选图仅用于待测试素材，不作为投放结论。`;navigator.clipboard.writeText(text).then(()=>alert('生成需求已复制'))}
async function runOcr(id){const row=ADSTAT_DATA.rows.find(x=>x.adId==id);const btn=document.querySelector(`[data-ocr="${id}"]`);if(!row)return;if(btn){btn.disabled=true;btn.textContent='识别中...'}try{const resp=await fetch('http://127.0.0.1:5088/ocr-material',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({adId:row.adId,image:row.image})});const json=await resp.json();if(!json.ok)throw new Error(json.error||json.status?.message||'OCR识别失败');row.materialAnalysis={type:json.result.materialType,ocrStatus:json.result.ocrStatus,coreText:json.result.coreText,marketFit:json.result.marketFit,rawOcr:json.result.rawText,note:json.result.note};render()}catch(e){if(btn){btn.disabled=false;btn.textContent='OCR识别'}alert(`OCR识别失败：${e.message}\n请确认本地助手窗口已启动，并保持网络可访问素材图片。`)}}
function exportCsv(){const rows=filtered();const header=Object.keys(rows[0]||{});const csv=[header.join(','),...rows.map(r=>header.map(k=>`"${String(r[k]??'').replaceAll('"','""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='duanxianwang-renewal-adstat.csv';a.click()}
function copyDay(){const rows=filtered().filter(r=>r.date===state.selectedDate),s=sum(rows);navigator.clipboard.writeText(`日期：${state.selectedDate}\n广告数：${rows.length}\n弹出：${s.popup}\n点击：${s.click}\n订单：${s.order}\n成交：${s.deal}\n点击率：${pct(s.clickRate)}\n策略：优先处理高曝光低点击、下单好但成交弱素材。`).then(()=>alert('当天复盘已复制'))}
async function callHelper(path){const payload={startDate:$('startDate').value,endDate:$('endDate').value,channel:state.channel,projectName:state.projectName,groupId:state.groupId};$('status').textContent=`正在连接本地助手，准备更新 ${payload.projectName} ${payload.startDate} 至 ${payload.endDate}...`;try{const r=await fetch(`http://127.0.0.1:5088${path}`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});const j=await r.json();$('status').textContent=`本地助手：${j.status?.message||j.error||'完成'}；请刷新页面查看最新结果。`;if(!j.ok) alert(j.status?.message||j.error||'本地助手执行失败')}catch(e){$('status').textContent='本地助手未启动或 5088 端口不可用';alert('本地助手未启动：请运行 scripts/adstat-local-helper.ps1，并保持后台浏览器登录。')}}
function resetDetailLimit(){state.detailLimit=50}
$('project').innerHTML=PROJECTS.map(p=>`<option value="${p.name}" data-group-id="${p.groupId}" ${p.name===state.projectName?'selected':''}>${p.name}</option>`).join('');$('project').onchange=e=>{const opt=e.target.selectedOptions[0];state.projectName=e.target.value;state.groupId=String(opt.dataset.groupId||'');ADSTAT_DATA.project.name=state.projectName;ADSTAT_DATA.project.groupId=state.groupId;render()};['channel','sample','dateType','search'].forEach(id=>$(id).addEventListener('input',e=>{state[id]=id==='sample'?Number(e.target.value):e.target.value;resetDetailLimit();render()}));$('theme').value=localStorage.getItem('adstat-theme')||'simple';document.body.dataset.theme=$('theme').value;$('theme').onchange=e=>{document.body.dataset.theme=e.target.value;localStorage.setItem('adstat-theme',e.target.value)};$('diagnosisDate').onchange=e=>{state.selectedDate=e.target.value;render()};$('detailDate').onchange=e=>{state.detailDate=e.target.value;resetDetailLimit();render()};$('detailChannel').onchange=e=>{state.detailChannel=e.target.value;resetDetailLimit();render()};$('detailAudience').oninput=e=>{state.detailAudience=e.target.value.trim();resetDetailLimit();render()};$('clearDetailFilters').onclick=()=>{state.detailDate='ALL';state.detailChannel='ALL';state.detailAudience='';$('detailAudience').value='';resetDetailLimit();render()};document.querySelectorAll('[data-grain]').forEach(b=>b.onclick=()=>{state.grain=b.dataset.grain;render()});$('exportData').onclick=exportCsv;$('exportChart').onclick=()=>{const a=document.createElement('a');a.href=$('trend').toDataURL('image/png');a.download='trend.png';a.click()};$('updateLatest').onclick=()=>callHelper('/update-latest');$('makePpt').onclick=()=>{if(ADSTAT_DATA.sideData.ppt.file){location.href=ADSTAT_DATA.sideData.ppt.file}else{alert('PPT生成失败：未配置用户模板或本地助手。')}};$('savePpt').onclick=()=>{if(ADSTAT_DATA.sideData.ppt.file){const a=document.createElement('a');a.href=ADSTAT_DATA.sideData.ppt.file;a.download='短线王续费-广告复盘-2026-06-22.pptx';a.click()}else{alert('另存为PPT不可用：尚未生成 pptx。')}};$('copyAll').onclick=copyDay;$('closeDrawer').onclick=()=>$('drawer').classList.remove('open');render();
</script>
