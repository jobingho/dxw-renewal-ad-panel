/* Mint finance dashboard visual system inspired by the provided reference board. */
:root{
  --mint-bg:#edf7f2;
  --mint-bg-2:#f8fbf8;
  --mint-panel:rgba(255,255,255,.88);
  --mint-ink:#18302d;
  --mint-muted:#6e8480;
  --mint-line:#d8e8e3;
  --mint-accent:#2f8f73;
  --mint-accent-2:#9adf7f;
  --mint-coral:#ff9f8f;
  --mint-yellow:#d9f15f;
  --mint-shadow:0 18px 45px rgba(45,96,83,.12);
}
body{
  background:
    radial-gradient(circle at 18% 8%, rgba(154,223,127,.28), transparent 28%),
    radial-gradient(circle at 88% 16%, rgba(255,159,143,.18), transparent 24%),
    linear-gradient(135deg,var(--mint-bg),#f7fbf8 42%,#eef8f4);
  color:var(--mint-ink);
  padding-left:86px;
}
.side-rail{
  position:fixed;
  left:18px;
  top:18px;
  bottom:18px;
  width:54px;
  z-index:20;
  border-radius:28px;
  background:#17332f;
  box-shadow:0 18px 36px rgba(23,51,47,.24);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:14px 0;
}
.rail-logo{
  width:34px;height:34px;border-radius:16px;
  background:linear-gradient(135deg,var(--mint-accent-2),#fff6a8);
  color:#17332f;font-weight:900;display:grid;place-items:center;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);
}
.rail-dot{
  width:32px;height:32px;border-radius:14px;
  color:#bdd6ce;display:grid;place-items:center;
  font-size:13px;font-weight:800;
}
.rail-dot.active{background:#244a43;color:#fff}
header{
  margin:18px 26px 0 0;
  padding:22px 24px;
  border:1px solid rgba(216,232,227,.9);
  border-radius:26px;
  background:linear-gradient(120deg,rgba(255,255,255,.94),rgba(244,251,247,.88));
  box-shadow:var(--mint-shadow);
  backdrop-filter:blur(12px);
}
h1{
  font-size:28px;
  line-height:1.1;
  letter-spacing:0;
  color:#102b27;
}
.toolbar{
  grid-template-columns:repeat(6,minmax(150px,1fr));
  gap:12px;
}
label{
  color:var(--mint-muted);
  font-weight:700;
  font-size:12px;
}
select,input{
  height:38px;
  border:1px solid var(--mint-line);
  background:rgba(255,255,255,.82);
  color:var(--mint-ink);
  border-radius:12px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
  font-weight:700;
}
button{
  height:38px;
  border-radius:13px;
  border:1px solid var(--mint-line);
  background:#fff;
  color:#17332f;
  box-shadow:0 6px 14px rgba(55,93,81,.08);
}
button:hover{transform:translateY(-1px);box-shadow:0 9px 20px rgba(55,93,81,.13)}
.primary,button.primary,#updateLatest{
  background:linear-gradient(135deg,#2f8f73,#62c78e);
  border-color:#2f8f73;
  color:#fff;
}
#makePpt,#savePpt{background:#17332f;color:#fff;border-color:#17332f}
.status{
  margin-top:14px;
  color:#5a706b;
  background:rgba(237,247,242,.8);
  border:1px solid var(--mint-line);
  border-radius:14px;
  padding:10px 12px;
}
main{
  padding:20px 26px 34px 0;
  gap:18px;
}
.section{
  border:1px solid rgba(216,232,227,.95);
  border-radius:24px;
  padding:18px;
  background:var(--mint-panel);
  box-shadow:var(--mint-shadow);
  backdrop-filter:blur(10px);
}

}

  color:#1f725c;
  border:1px solid #cfe8dd;
  font-weight:800;
}
img.thumb{
  width:84px;height:54px;
  border-radius:12px;
  border:1px solid var(--mint-line);
  box-shadow:0 6px 16px rgba(40,75,67,.12);
}
canvas{
  border:1px solid var(--mint-line);
  border-radius:20px;
  background:linear-gradient(180deg,#fff,#fbfefc);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
}
.drawer{
  border-left:1px solid var(--mint-line);
  background:rgba(255,255,255,.96);
  box-shadow:-18px 0 40px rgba(39,80,70,.18);
}
.empty{
  border-color:var(--mint-line);
  background:#f8fcfa;
  color:#526e67;
  border-radius:16px;
}

function repairOcrText(v){return String(v??'').replace(/\s+/g,' ').replace(/([\u4e00-\u9fff])\s+(?=[\u4e00-\u9fff])/g,'$1').replace(/([\u4e00-\u9fff])\s+(?=[0-9A-Za-z])/g,'$1').replace(/([0-9A-Za-z])\s+(?=[\u4e00-\u9fff])/g,'$1').replace(/\s+([пјҢгҖӮпјҒпјҹпјӣпјҡгҖҒпјүгҖӢ])/g,'$1').replace(/([гҖҠпјҲ])\s+/g,'$1').replace(/\s*\/\s*/g,'/').replaceAll('зҹӯзҺӢ','зҹӯзәҝзҺӢ').trim()}
function safeText(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function exportCsv(){const rows=filtered();const header=Object.keys(rows[0]||{});const csv=[header.join(','),...rows.map(r=>header.map(k=>`"${String(r[k]??'').replaceAll('"','""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='duanxianwang-renewal-adstat.csv';a.click()}
function copyDay(){const rows=filtered().filter(r=>r.date===state.selectedDate),s=sum(rows);navigator.clipboard.writeText(`ж—Ҙжңҹпјҡ${state.selectedDate}\nе№ҝе‘Ҡж•°пјҡ${rows.length}\nеј№еҮәпјҡ${s.popup}\nзӮ№еҮ»пјҡ${s.click}\nи®ўеҚ•пјҡ${s.order}\nжҲҗдәӨпјҡ${s.deal}\nзӮ№еҮ»зҺҮпјҡ${pct(s.clickRate)}\nзӯ–з•Ҙпјҡдјҳе…ҲеӨ„зҗҶй«ҳжӣқе…үдҪҺзӮ№еҮ»гҖҒдёӢеҚ•еҘҪдҪҶжҲҗдәӨејұзҙ жқҗгҖӮ`).then(()=>alert('еҪ“еӨ©еӨҚзӣҳе·ІеӨҚеҲ¶'))}
async function callHelper(path){const payload={startDate:$('startDate').value,endDate:$('endDate').value,channel:state.channel,projectName:state.projectName,groupId:state.groupId};$('status').textContent=`жӯЈеңЁиҝһжҺҘжң¬ең°еҠ©жүӢпјҢеҮҶеӨҮжӣҙж–° ${payload.projectName} ${payload.startDate} иҮі ${payload.endDate}...`;try{const r=await fetch(`http://127.0.0.1:5088${path}`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});const j=await r.json();$('status').textContent=`жң¬ең°еҠ©жүӢпјҡ${j.status?.message||j.error||'е®ҢжҲҗ'}пјӣиҜ·еҲ·ж–°йЎөйқўжҹҘзңӢжңҖж–°з»“жһңгҖӮ`;if(!j.ok) alert(j.status?.message||j.error||'жң¬ең°еҠ©жүӢжү§иЎҢеӨұиҙҘ')}catch(e){$('status').textContent='жң¬ең°еҠ©жүӢжңӘеҗҜеҠЁжҲ– 5088 з«ҜеҸЈдёҚеҸҜз”Ё';alert('жң¬ең°еҠ©жүӢжңӘеҗҜеҠЁпјҡиҜ·иҝҗиЎҢ scripts/adstat-local-helper.ps1пјҢе№¶дҝқжҢҒеҗҺеҸ°жөҸи§ҲеҷЁзҷ»еҪ•гҖӮ')}}
function resetDetailLimit(){state.detailLimit=50}
$('project').innerHTML=PROJECTS.map(p=>`<option value="${p.name}" data-group-id="${p.groupId}" ${p.name===state.projectName?'selected':''}>${p.name}</option>`).join('');$('project').onchange=e=>{const opt=e.target.selectedOptions[0];state.projectName=e.target.value;state.groupId=String(opt.dataset.groupId||'');ADSTAT_DATA.project.name=state.projectName;ADSTAT_DATA.project.groupId=state.groupId;render()};['channel','sample','dateType','search'].forEach(id=>$(id).addEventListener('input',e=>{state[id]=id==='sample'?Number(e.target.value):e.target.value;resetDetailLimit();render()}));$('theme').value=localStorage.getItem('adstat-theme')||'simple';document.body.dataset.theme=$('theme').value;$('theme').onchange=e=>{document.body.dataset.theme=e.target.value;localStorage.setItem('adstat-theme',e.target.value)};$('diagnosisDate').onchange=e=>{state.selectedDate=e.target.value;render()};$('detailDate').onchange=e=>{state.detailDate=e.target.value;resetDetailLimit();render()};$('detailChannel').onchange=e=>{state.detailChannel=e.target.value;resetDetailLimit();render()};$('detailAudience').oninput=e=>{state.detailAudience=e.target.value.trim();resetDetailLimit();render()};$('clearDetailFilters').onclick=()=>{state.detailDate='ALL';state.detailChannel='ALL';state.detailAudience='';$('detailAudience').value='';resetDetailLimit();render()};document.querySelectorAll('[data-grain]').forEach(b=>b.onclick=()=>{state.grain=b.dataset.grain;render()});$('exportData').onclick=exportCsv;$('exportChart').onclick=()=>{const a=document.createElement('a');a.href=$('trend').toDataURL('image/png');a.download='trend.png';a.click()};$('updateLatest').onclick=()=>callHelper('/update-latest');$('makePpt').onclick=()=>{if(ADSTAT_DATA.sideData.ppt.file){location.href=ADSTAT_DATA.sideData.ppt.file}else{alert('PPTз”ҹжҲҗеӨұиҙҘпјҡжңӘй…ҚзҪ®з”ЁжҲ·жЁЎжқҝжҲ–жң¬ең°еҠ©жүӢгҖӮ')}};$('savePpt').onclick=()=>{if(ADSTAT_DATA.sideData.ppt.file){const a=document.createElement('a');a.href=ADSTAT_DATA.sideData.ppt.file;a.download='зҹӯзәҝзҺӢз»ӯиҙ№-е№ҝе‘ҠеӨҚзӣҳ-2026-06-22.pptx';a.click()}else{alert('еҸҰеӯҳдёәPPTдёҚеҸҜз”Ёпјҡе°ҡжңӘз”ҹжҲҗ pptxгҖӮ')}};$('copyAll').onclick=copyDay;$('closeDrawer').onclick=()=>$('drawer').classList.remove('open');render();
</script>
